<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS — Test</title>
<style>
  :root {
    --bg: #0a0a0f;
    --bg-section: rgba(255,255,255,0.02);
    --border: rgba(255,255,255,0.06);
    --text: #e0e0e0;
    --text-heading: #ffffff;
    --text-dim: rgba(255,255,255,0.35);
    --text-muted: #333333;
    --accent: #f59e0b;
    --pre-bg: rgba(0,0,0,0.3);
    --pre-text: rgba(255,255,255,0.7);
    --link-color: #ef4444;
  }
  [data-theme="light"] {
    --bg: #f5f5f0;
    --bg-section: #ffffff;
    --border: rgba(0,0,0,0.08);
    --text: #333333;
    --text-heading: #111111;
    --text-dim: #555555;
    --text-muted: #333333;
    --accent: #d97706;
    --pre-bg: rgba(0,0,0,0.03);
    --pre-text: #333333;
    --link-color: #dc2626;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 40px;
    max-width: 900px;
    margin: 0 auto;
    transition: background 0.3s ease, color 0.3s ease;
  }
  .back { margin-bottom: 20px; }
  .back a { color: var(--text-dim); text-decoration: none; font-size: 14px; }
  .back a:hover { color: var(--accent); }
  h1 { font-size: 26px; color: var(--text-heading); margin-bottom: 6px; }
  .cat-badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 6px;
    margin-bottom: 16px;
  }
  .meta { color: var(--text-dim); font-size: 13px; margin-bottom: 24px; }
  .section {
    background: var(--bg-section);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .section h2 { font-size: 15px; color: var(--accent); margin-bottom: 12px; }
  .field { margin-bottom: 6px; font-size: 14px; }
  .field .label { color: var(--text-dim); }
  .field .value { color: var(--text); }
  pre {
    background: var(--pre-bg);
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    line-height: 1.6;
    overflow-x: auto;
    white-space: pre-wrap;
    font-family: 'Fira Code', monospace;
    color: var(--pre-text);
  }
  ul { list-style: none; }
  li { padding: 6px 0; font-size: 14px; word-break: break-all; }
  li a { color: var(--link-color); }
</style>
</head>
<body>
  <div class="back"><a href="/">← Back to Dashboard</a></div>
  <span class="cat-badge" style="background:rgba(245,158,11,0.15);color:#f59e0b;">⏳ Pending</span>
  <h1>Test</h1>
  <p class="meta">test@x.com · 2024 · ID: test123</p>

  <!-- JARVIS Analysis section (populated by JS) -->
  <div class="section" id="jarvis-analysis">
    <h2>🤖 JARVIS Analysis</h2>
    <p id="analysis-status" style="color:var(--text-dim);font-size:13px;">⏳ Analysing...</p>
    <div id="analysis-result" style="font-size:14px;line-height:1.7;white-space:pre-wrap;font-family:'Fira Code',monospace;"></div>
  </div>

  <div class="section">
    <h2>📋 Summary</h2>
    <p style="font-size:14px;line-height:1.7;color:var(--text);">Test summary</p>
  </div>

  <div class="section">
    <h2>📋 Email Headers</h2>
    <div class="field"><span class="label">From:</span> <span class="value">test@x.com</span></div>
    <div class="field"><span class="label">Subject:</span> <span class="value">Test</span></div>
    <div class="field"><span class="label">Date:</span> <span class="value">2024</span></div>
  </div>

  <div class="section">
    <h2>📝 Full Body</h2>
    <pre>hello world</pre>
  </div>
<script>
// JARVIS Auto-Analysis - live scam analysis via Gateway API
const EMAIL_DATA = {"headers": {"From": "test@x.com", "Subject": "Test", "Date": "2024"}, "body": "hello world", "urls": []};
const CACHED_ANALYSIS = null;

if (CACHED_ANALYSIS && CACHED_ANALYSIS.length > 20) {
  // Pre-generated analysis available - skip API call
  document.getElementById('analysis-status').textContent = '\u2705 Complete';
  document.getElementById('analysis-status').style.color = '#22c55e';
  return;
}

(async function() {
const statusEl = document.getElementById('analysis-status');
const resultEl = document.getElementById('analysis-result');
if (!statusEl) return;

// Build email text
const h = EMAIL_DATA.headers || {};
const emailText = [
  'From: ' + (h.From || 'unknown'),
  'To: ' + (h.To || 'unknown'),
  'Reply-To: ' + (h['Reply-To'] || '(not set)'),
  'Subject: ' + (h.Subject || '(no subject)'),
  'Date: ' + (h.Date || ''),
  'Return-Path: ' + (h['Return-Path'] || '(not set)'),
  '',
  (EMAIL_DATA.body || '')
].join('\n');

let urlText = '';
if (EMAIL_DATA.urls && EMAIL_DATA.urls.length) {
  urlText = '\n\nURLs in this email:\n' + EMAIL_DATA.urls.map(u => '  - ' + u).join('\n');
}

try {
  const res = await fetch('/v1/responses', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-openclaw-model': 'openrouter/deepseek/deepseek-v4-flash' },
    body: JSON.stringify({
      input: emailText + urlText,
      instructions: `You are JARVIS, a scam and phishing detection specialist.

Analyse this email for ALL of the following:

### Email Header Analysis
- Sender domain spoofing? Display name mismatch?
- Reply-To different from sender? (Common phish tactic)
- Return-Path / Envelope-From mismatch?

### URL Analysis (for EVERY link)
- Domain mimicry (g00gle.com, paypa1.com, amaz0n-secure.com)
- URL shorteners (bit.ly, tinyurl, etc.)
- Suspicious TLDs (.xyz, .top, .click, .gq, .ml, .cf)
- Encoded or obfuscated URLs

### Content Red Flags
- Urgency/pressure ("suspended", "verify immediately", "24 hours")
- Generic greetings ("Dear Customer") instead of name
- Grammatical errors, typos, odd phrasing
- Threats or too-good-to-be-true offers
- Credential/password/OTP/credit card requests
- Unsolicited invoices or attachments
- Crypto/currency payment requests
- CEO/angler fraud (exec impersonation)

Output format:
First line: OVERALL VERDICT (HIGH / MEDIUM / LOW / CLEAR)
Then sections: SUMMARY, CONCERNS IDENTIFIED, EMAIL INTELLIGENCE, URL ANALYSIS, PHISHING INDICATORS, VERDICT

Be direct, concise, tactical.`,

      model: 'openclaw',
      max_output_tokens: 4096
    })
  });

  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  const text = (data.output || [])
    .filter(o => o.type === 'message')
    .map(o => (o.content || []).map(c => c.text || '').join('\n'))
    .join('\n');

  if (text.trim()) {
    statusEl.textContent = '\u2705 Analysis Complete';
    statusEl.style.color = '#22c55e';
    resultEl.textContent = text;
  } else {
    statusEl.textContent = '\u274c No output from JARVIS';
    statusEl.style.color = '#ef4444';
    resultEl.textContent = 'API returned empty response. The raw email is below.';
  }
} catch(e) {
  statusEl.textContent = '\u274c Analysis Failed';
  statusEl.style.color = '#ef4444';
  resultEl.textContent = 'Could not connect to JARVIS: ' + e.message + '\n\nRaw email content is shown below.';
}
})();
</script></body>
</html>
